  # ── Chat (widget-facing) ──────────────────────────────────────────────────────

  /api/chat/conversations:
    post:
      tags: [Chat]
      summary: Start a new chat conversation (widget)
      description: Rate-limited to 5 conversations per IP per hour.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visitorId]
              properties:
                visitorId:
                  type: string
                name:
                  type: string
                email:
                  type: string
                  format: email
                topic:
                  type: string
                pageUrl:
                  type: string
      responses:
        '200':
          description: Conversation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversationId:
                    type: string
                  visitorToken:
                    type: string
        '400':
          description: visitorId required
        '429':
          description: Rate limited

  /api/chat/conversations/{id}/messages:
    get:
      tags: [Chat]
      summary: Get messages for a conversation (visitor)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: visitorId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Messages and conversation status
        '400':
          description: visitorId required
        '404':
          description: Not found
    post:
      tags: [Chat]
      summary: Send a message (visitor)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visitorId, body]
              properties:
                visitorId:
                  type: string
                body:
                  type: string
                fileUrl:
                  type: string
                replyToId:
                  type: string
                replyToBody:
                  type: string
                replyToSender:
                  type: string
                replyToFileUrl:
                  type: string
      responses:
        '200':
          description: Message sent
        '400':
          description: Conversation closed or missing fields

  /api/chat/conversations/{id}/heartbeat:
    post:
      tags: [Chat]
      summary: Visitor heartbeat (updates last seen, triggers presence event)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visitorId]
              properties:
                visitorId:
                  type: string
      responses:
        '200':
          description: Ok

  /api/chat/conversations/{id}/presence:
    post:
      tags: [Chat]
      summary: Broadcast visitor online/offline presence
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visitorId, online]
              properties:
                visitorId:
                  type: string
                online:
                  type: boolean
      responses:
        '200':
          description: Broadcast sent

  /api/chat/conversations/{id}/read:
    post:
      tags: [Chat]
      summary: Visitor marks agent messages as read
      description: Requires `x-visitor-token` header.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Marked as read
        '401':
          description: Missing visitor token
        '403':
          description: Invalid visitor token

  /api/chat/conversations/{id}/typing:
    post:
      tags: [Chat]
      summary: Broadcast visitor typing indicator
      description: Requires `x-visitor-token` header.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                typing:
                  type: boolean
      responses:
        '200':
          description: Broadcast sent

  /api/chat/conversations/{id}/recording:
    post:
      tags: [Chat]
      summary: Broadcast visitor recording indicator
      description: Requires `x-visitor-token` header.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                recording:
                  type: boolean
      responses:
        '200':
          description: Broadcast sent

  /api/chat/conversations/{id}/messages/{msgId}/react:
    post:
      tags: [Chat]
      summary: Visitor reacts to a message
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: msgId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties:
                emoji:
                  type: string
                reactorId:
                  type: string
      responses:
        '200':
          description: Updated reactions

  /api/chat/conversations/{id}/messages/{msgId}/seen:
    post:
      tags: [Chat]
      summary: Mark media message as listened/watched/clicked (visitor)
      description: Requires `x-visitor-token` header.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: msgId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [listened, watched, clicked]
      responses:
        '200':
          description: Marked

  /api/chat/status:
    get:
      tags: [Chat]
      summary: Check if any admin is online (within last 2 minutes)
      responses:
        '200':
          description: Online status
          content:
            application/json:
              schema:
                type: object
                properties:
                  online:
                    type: boolean

  /api/chat/heartbeat:
    post:
      tags: [Chat]
      summary: Admin heartbeat — updates lastHeartbeat and broadcasts presence
      responses:
        '200':
          description: Ok
        '401':
          description: Unauthorized

  /api/chat/presence:
    post:
      tags: [Chat]
      summary: Admin presence update (online/offline on Pusher connect/disconnect)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                online:
                  type: boolean
      responses:
        '200':
          description: Ok

  /api/chat/link-preview:
    get:
      tags: [Chat]
      summary: Fetch OG metadata for a URL (SSRF-protected)
      parameters:
        - in: query
          name: url
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OG metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    nullable: true
                  description:
                    type: string
                    nullable: true
                  image:
                    type: string
                    nullable: true
                  siteName:
                    type: string
                    nullable: true
                  url:
                    type: string
        '400':
          description: Invalid or private URL

  /api/chat/upload:
    post:
      tags: [Chat]
      summary: Upload a file for use in widget chat
      description: Requires valid conversationId and visitorToken. Rate-limited to 10 per IP per minute.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, conversationId, visitorToken]
              properties:
                file:
                  type: string
                  format: binary
                conversationId:
                  type: string
                visitorToken:
                  type: string
      responses:
        '200':
          description: File URL
        '403':
          description: Invalid conversation or token
        '413':
          description: File too large
        '415':
          description: Unsupported file type
        '429':
          description: Rate limited

