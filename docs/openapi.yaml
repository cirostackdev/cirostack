openapi: 3.0.3

info:
  title: CiroStack API
  description: |
    REST API for the CiroStack software agency platform.

    **Admin auth:** NextAuth session cookie (admin panel login at `/admin/login`)
    **Portal auth:** NextAuth session cookie (client portal login at `/portal/login`)
    **Chat widget:** No auth — uses `visitorId` + `x-visitor-token` header
    **Cron routes:** `Authorization: Bearer <CRON_SECRET>`
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Admin-Team
  - name: Admin-Analytics
  - name: Admin-Conversations
  - name: Admin-CMS
  - name: Admin-Clients
  - name: Admin-Projects
  - name: Admin-Invoices
  - name: Admin-Leads
  - name: Admin-Knowledge-Base
  - name: Admin-Automation
  - name: Admin-Config
  - name: Admin-Export
  - name: Chat
  - name: Portal-Auth
  - name: Portal-Projects
  - name: Portal-Invoices
  - name: Portal-Chat
  - name: Portal-Notifications
  - name: Portal-Config
  - name: Public
  - name: Webhooks
  - name: Push

components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    Ok:
      type: object
      properties:
        ok:
          type: boolean
          example: true

    Admin:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [agent, super]
        online:
          type: boolean
        disabled:
          type: boolean
        createdAt:
          type: string
          format: date-time

    Conversation:
      type: object
      properties:
        id:
          type: string
        visitorId:
          type: string
        visitorName:
          type: string
          nullable: true
        visitorEmail:
          type: string
          nullable: true
        topic:
          type: string
          nullable: true
        status:
          type: string
          enum: [open, closed]
        priority:
          type: string
          enum: [normal, high, urgent]
        assignedToId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        id:
          type: string
        conversationId:
          type: string
        senderType:
          type: string
          enum: [visitor, agent, system]
        senderId:
          type: string
          nullable: true
        senderName:
          type: string
          nullable: true
        body:
          type: string
        fileUrl:
          type: string
          nullable: true
        read:
          type: boolean
        replyToId:
          type: string
          nullable: true
        reactions:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time

    Client:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
          nullable: true
        company:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: string
        clientId:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [discovery, active, review, complete]
        startDate:
          type: string
          format: date-time
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    Invoice:
      type: object
      properties:
        id:
          type: string
        clientId:
          type: string
        projectId:
          type: string
          nullable: true
        number:
          type: string
        amount:
          type: integer
          description: Amount in smallest currency unit (cents)
        currency:
          type: string
        status:
          type: string
          enum: [unpaid, paid, overdue]
        dueDate:
          type: string
          format: date-time
          nullable: true
        paidAt:
          type: string
          format: date-time
          nullable: true
        lineItems:
          type: object
        createdAt:
          type: string
          format: date-time

    BlogPost:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type: string
        excerpt:
          type: string
        category:
          type: string
        author:
          type: string
        date:
          type: string
        readMin:
          type: integer
        imageUrl:
          type: string
          nullable: true
        featured:
          type: boolean
        published:
          type: boolean
        tags:
          type: array
          items:
            type: string

    NewsArticle:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type: string
        description:
          type: string
        content:
          type: string
        url:
          type: string
        image:
          type: string
          nullable: true
        publishedAt:
          type: string
          format: date-time
        source:
          type: string
        sourceUrl:
          type: string
          nullable: true
        type:
          type: string

    Lead:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    AssignmentRule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [round-robin, topic-based, load-balance]
        criteria:
          type: object
          nullable: true
        adminIds:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        priority:
          type: integer

    AutomationRule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        trigger:
          type: string
          enum: [new-conversation, offline, keyword, no-response]
        conditions:
          type: object
          nullable: true
        action:
          type: string
          enum: [send-message, assign, tag, close]
        actionData:
          type: object
        enabled:
          type: boolean
        priority:
          type: integer

    CannedResponse:
      type: object
      properties:
        id:
          type: string
        adminId:
          type: string
          nullable: true
        title:
          type: string
        shortcut:
          type: string
          nullable: true
        content:
          type: string
        category:
          type: string

    KnowledgeArticle:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type: string
        content:
          type: string
        category:
          type: string
        published:
          type: boolean
        order:
          type: integer

    Notification:
      type: object
      properties:
        id:
          type: string
        clientId:
          type: string
        title:
          type: string
        body:
          type: string
        href:
          type: string
          nullable: true
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

paths:
  # ── Admin: Team ──────────────────────────────────────────────────────────────

  /api/admin/admins:
    get:
      tags: [Admin-Team]
      summary: List all active admins
      responses:
        '200':
          description: List of admins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Admin'
        '401':
          description: Unauthorized
    post:
      tags: [Admin-Team]
      summary: Create a new admin (super role only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                role:
                  type: string
                  enum: [agent, super]
      responses:
        '200':
          description: Created admin
        '400':
          description: Missing required fields
        '401':
          description: Unauthorized
        '409':
          description: Email already in use

  /api/admin/admins/{id}:
    patch:
      tags: [Admin-Team]
      summary: Disable or enable an admin (super role only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                disabled:
                  type: boolean
      responses:
        '200':
          description: Updated
        '401':
          description: Unauthorized
    delete:
      tags: [Admin-Team]
      summary: Delete an admin (super role only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '401':
          description: Unauthorized
        '404':
          description: Not found

  /api/admin/admins/me:
    patch:
      tags: [Admin-Team]
      summary: Update current admin profile or password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                currentPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Updated profile
        '400':
          description: Missing current password or nothing to update
        '401':
          description: Unauthorized

  # ── Admin: Analytics ─────────────────────────────────────────────────────────

  /api/admin/analytics:
    get:
      tags: [Admin-Analytics]
      summary: Comprehensive analytics dashboard data
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: Analytics data including KPIs, pipeline, financial, projects, content, conversations
        '401':
          description: Unauthorized

  /api/admin/analytics/sla:
    get:
      tags: [Admin-Analytics]
      summary: SLA compliance metrics
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            default: 30
        - in: query
          name: maxFirstResponseMins
          schema:
            type: integer
      responses:
        '200':
          description: SLA metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  avgFirstResponseMins:
                    type: number
                  complianceRate:
                    type: integer
                  breaches:
                    type: integer
                  totalConversations:
                    type: integer

  /api/admin/analytics/agents:
    get:
      tags: [Admin-Analytics]
      summary: Per-agent performance stats
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: Agent stats array
        '401':
          description: Unauthorized

  /api/admin/csat:
    get:
      tags: [Admin-Analytics]
      summary: CSAT ratings and metrics
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: CSAT data with distribution and recent feedback
        '401':
          description: Unauthorized

  # ── Admin: Conversations ──────────────────────────────────────────────────────

  /api/admin/conversations:
    get:
      tags: [Admin-Conversations]
      summary: List conversations (latest 100)
      responses:
        '200':
          description: Conversations with latest message and assignee
        '401':
          description: Unauthorized

  /api/admin/conversations/{id}:
    get:
      tags: [Admin-Conversations]
      summary: Get a conversation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conversation
        '401':
          description: Unauthorized
        '404':
          description: Not found
    patch:
      tags: [Admin-Conversations]
      summary: Update conversation status, assignment, or metadata
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                assignedToId:
                  type: string
                  nullable: true
                metadata:
                  type: object
      responses:
        '200':
          description: Updated conversation
        '404':
          description: Not found
    delete:
      tags: [Admin-Conversations]
      summary: Delete a conversation and all its messages
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found

  /api/admin/conversations/{id}/assign:
    post:
      tags: [Admin-Conversations]
      summary: Assign conversation to an admin
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                adminId:
                  type: string
                  nullable: true
                transferNote:
                  type: string
      responses:
        '200':
          description: Updated conversation
        '404':
          description: Not found

  /api/admin/conversations/{id}/claim:
    post:
      tags: [Admin-Conversations]
      summary: Claim a conversation (assign to self)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conversation claimed
        '409':
          description: Already assigned to another agent

  /api/admin/conversations/{id}/close:
    post:
      tags: [Admin-Conversations]
      summary: Close a conversation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Closed

  /api/admin/conversations/{id}/messages:
    post:
      tags: [Admin-Conversations]
      summary: Send a message to a conversation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
                fileUrl:
                  type: string
                replyToId:
                  type: string
                replyToBody:
                  type: string
                replyToSender:
                  type: string
                replyToFileUrl:
                  type: string
      responses:
        '200':
          description: Message sent
        '400':
          description: Body required

  /api/admin/conversations/{id}/messages/{msgId}/react:
    post:
      tags: [Admin-Conversations]
      summary: React to a message
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: msgId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties:
                emoji:
                  type: string
      responses:
        '200':
          description: Updated reactions
        '404':
          description: Not found

  /api/admin/conversations/{id}/messages/{msgId}:
    delete:
      tags: [Admin-Conversations]
      summary: Delete a message
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: msgId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found

  /api/admin/conversations/{id}/messages/{msgId}/seen:
    post:
      tags: [Admin-Conversations]
      summary: Mark media message as listened/watched/clicked
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: msgId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [listened, watched, clicked]
      responses:
        '200':
          description: Marked
        '400':
          description: Invalid type

  /api/admin/conversations/{id}/notes:
    get:
      tags: [Admin-Conversations]
      summary: List internal notes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Notes with admin name
    post:
      tags: [Admin-Conversations]
      summary: Add an internal note
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
      responses:
        '201':
          description: Note created
        '400':
          description: Body required

  /api/admin/conversations/{id}/read:
    post:
      tags: [Admin-Conversations]
      summary: Mark all visitor messages as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Marked as read

  /api/admin/conversations/{id}/tags:
    post:
      tags: [Admin-Conversations]
      summary: Add a tag to a conversation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tagId]
              properties:
                tagId:
                  type: string
      responses:
        '200':
          description: Tag added
    delete:
      tags: [Admin-Conversations]
      summary: Remove a tag from a conversation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tagId]
              properties:
                tagId:
                  type: string
      responses:
        '200':
          description: Tag removed

  /api/admin/conversations/{id}/typing:
    post:
      tags: [Admin-Conversations]
      summary: Broadcast agent typing indicator
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                typing:
                  type: boolean
      responses:
        '200':
          description: Broadcast sent

  /api/admin/conversations/{id}/recording:
    post:
      tags: [Admin-Conversations]
      summary: Broadcast agent recording indicator
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                recording:
                  type: boolean
      responses:
        '200':
          description: Broadcast sent

  /api/admin/conversations/bulk:
    post:
      tags: [Admin-Conversations]
      summary: Bulk close, assign, or delete conversations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, ids]
              properties:
                action:
                  type: string
                  enum: [close, assign, delete]
                ids:
                  type: array
                  items:
                    type: string
                adminId:
                  type: string
                  description: Required for assign action
      responses:
        '200':
          description: Bulk action applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  affected:
                    type: integer
        '400':
          description: No IDs or unknown action

  /api/admin/chat-upload:
    post:
      tags: [Admin-Conversations]
      summary: Upload a file for use in chat (images, video, audio, docs up to 100MB)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Uploaded file URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                  name:
                    type: string
                  type:
                    type: string
                  size:
                    type: integer
        '401':
          description: Unauthorized
        '413':
          description: File too large
        '415':
          description: Unsupported file type

  # ── Admin: Clients ────────────────────────────────────────────────────────────

  /api/admin/clients:
    get:
      tags: [Admin-Clients]
      summary: List all clients
      responses:
        '200':
          description: Clients with project and invoice counts
        '401':
          description: Unauthorized
    post:
      tags: [Admin-Clients]
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                company:
                  type: string
      responses:
        '201':
          description: Client created
        '400':
          description: Email required
        '409':
          description: Email already exists

  /api/admin/clients/{id}:
    get:
      tags: [Admin-Clients]
      summary: Get client with projects and invoices
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Client detail
        '404':
          description: Not found
    patch:
      tags: [Admin-Clients]
      summary: Update client name, company, or email
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                company:
                  type: string
                email:
                  type: string
      responses:
        '200':
          description: Updated client
        '404':
          description: Not found
    delete:
      tags: [Admin-Clients]
      summary: Delete a client
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found

  /api/admin/clients/{id}/conversations:
    get:
      tags: [Admin-Clients]
      summary: Get conversations linked to a client by email
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conversation summaries
        '404':
          description: Client not found

  /api/admin/clients/{id}/invite:
    post:
      tags: [Admin-Clients]
      summary: Send portal invitation email to client
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invitation sent
        '404':
          description: Client not found

  # ── Admin: Projects ───────────────────────────────────────────────────────────

  /api/admin/projects:
    get:
      tags: [Admin-Projects]
      summary: List all projects
      responses:
        '200':
          description: Projects list
        '401':
          description: Unauthorized
    post:
      tags: [Admin-Projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [clientId, title]
              properties:
                clientId:
                  type: string
                title:
                  type: string
                description:
                  type: string
                status:
                  type: string
                startDate:
                  type: string
                  format: date-time
                dueDate:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Project created

  /api/admin/projects/{id}:
    get:
      tags: [Admin-Projects]
      summary: Get project detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
