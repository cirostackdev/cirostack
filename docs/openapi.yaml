      responses:
        '200':
          description: Ok

  # ── Portal: Config ────────────────────────────────────────────────────────────

  /api/portal/settings:
    get:
      tags: [Portal-Config]
      summary: Get client profile settings
      responses:
        '200':
          description: Client profile
        '401':
          description: Unauthorized
    patch:
      tags: [Portal-Config]
      summary: Update client profile
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                company:
                  type: string
      responses:
        '200':
          description: Updated profile

  /api/portal/team:
    get:
      tags: [Portal-Config]
      summary: List client team members
      responses:
        '200':
          description: Team members
    post:
      tags: [Portal-Config]
      summary: Invite a team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                role:
                  type: string
                  enum: [viewer, admin]
      responses:
        '201':
          description: Member invited
        '409':
          description: Already a team member
    delete:
      tags: [Portal-Config]
      summary: Remove a team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [memberId]
              properties:
                memberId:
                  type: string
      responses:
        '200':
          description: Removed

  /api/portal/analytics:
    get:
      tags: [Portal-Config]
      summary: Client analytics (monthly spend, project status breakdown)
      responses:
        '200':
          description: Analytics data
        '401':
          description: Unauthorized

  /api/portal/knowledge-base:
    get:
      tags: [Portal-Config]
      summary: List published knowledge base articles (portal view)
      responses:
        '200':
          description: Articles

  /api/portal/search:
    get:
      tags: [Portal-Config]
      summary: Search projects, invoices, files, and messages
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Search results
        '401':
          description: Unauthorized

  # ── Public ────────────────────────────────────────────────────────────────────

  /api/cms/posts:
    get:
      tags: [Public]
      summary: List published blog posts
      responses:
        '200':
          description: Published posts (id, slug, title, excerpt, category, author, date, readMin, imageUrl, featured, tags)

  /api/cms/posts/{slug}:
    get:
      tags: [Public]
      summary: Get a published blog post by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Blog post
        '404':
          description: Not found

  /api/cms/portfolio:
    get:
      tags: [Public]
      summary: List published portfolio projects
      responses:
        '200':
          description: Portfolio projects

  /api/cms/portfolio/{slug}:
    get:
      tags: [Public]
      summary: Get a published portfolio project by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Portfolio project
        '404':
          description: Not found

  /api/cms/jobs:
    get:
      tags: [Public]
      summary: List active job listings
      responses:
        '200':
          description: Active jobs

  /api/news:
    get:
      tags: [Public]
      summary: List news articles (paginated, filterable)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 30
            maximum: 50
        - in: query
          name: type
          schema:
            type: string
            enum: [guardian, techcrunch]
          description: Filter by source
        - in: query
          name: category
          schema:
            type: string
            enum: [ai, startups, fintech, security, software, enterprise]
          description: Filter by keyword category
      responses:
        '200':
          description: Articles with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  articles:
                    type: array
                    items:
                      $ref: '#/components/schemas/NewsArticle'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      pages:
                        type: integer

  /api/news/{slug}:
    get:
      tags: [Public]
      summary: Get a news article by slug (sanitized HTML content)
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: News article
        '404':
          description: Not found

  /api/news/sync:
    get:
      tags: [Public]
      summary: Trigger news sync (cron or manual)
      description: Requires `Authorization: Bearer <CRON_SECRET>` header.
      parameters:
        - in: query
          name: source
          schema:
            type: string
          description: Specific source to sync, or omit for all
      responses:
        '200':
          description: Sync result
        '401':
          description: Unauthorized

  /api/contact/start:
    post:
      tags: [Public]
      summary: Submit a project brief or enquiry
      description: Rate-limited per email. Sends email to team and confirmation to submitter.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, service, description]
              properties:
                name:
                  type: string
                company:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                service:
                  type: string
                budget:
                  type: string
                timeline:
                  type: string
                description:
                  type: string
                source:
                  type: string
      responses:
        '200':
          description: Submitted
        '400':
          description: Missing required fields
        '429':
          description: Rate limited

  /api/contact/consultation:
    post:
      tags: [Public]
      summary: Submit a consultation request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, timezone, message]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                company:
                  type: string
                timezone:
                  type: string
                timeOfDay:
                  type: string
                message:
                  type: string
      responses:
        '200':
          description: Submitted
        '400':
          description: Missing required fields
        '429':
          description: Rate limited

  /api/contact/press:
    post:
      tags: [Public]
      summary: Submit a press or speaking inquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, organisation, requestType, details]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                organisation:
                  type: string
                requestType:
                  type: string
                eventDate:
                  type: string
                details:
                  type: string
      responses:
        '200':
          description: Submitted
        '400':
          description: Missing required fields
        '429':
          description: Rate limited

  /api/contact/careers:
    post:
      tags: [Public]
      summary: Submit a job application with CV
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [fullName, email, role, linkedin, github, experience, coverLetter, cv]
              properties:
                fullName:
                  type: string
                email:
                  type: string
                  format: email
                role:
                  type: string
                linkedin:
                  type: string
                  description: Must be a valid linkedin.com URL
                github:
                  type: string
                  description: Must be a valid github.com URL
                experience:
                  type: string
                coverLetter:
                  type: string
                cv:
                  type: string
                  format: binary
                  description: PDF or Word document, max 5MB
      responses:
        '200':
          description: Application submitted
        '400':
          description: Missing fields or invalid LinkedIn/GitHub URL
        '413':
          description: CV too large
        '415':
          description: Invalid CV format
        '429':
          description: Rate limited

  /api/csat:
    post:
      tags: [Public]
      summary: Submit a CSAT rating for a conversation
      description: Requires `x-visitor-token` header matching the conversation's visitor token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversationId, rating]
              properties:
                conversationId:
                  type: string
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                feedback:
                  type: string
      responses:
        '201':
          description: Rating submitted
        '400':
          description: Missing fields or invalid rating
        '403':
          description: Invalid visitor token
        '404':
          description: Conversation not found
        '409':
          description: Already rated

  /api/events/register:
    post:
      tags: [Public]
      summary: Register for an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, eventTitle]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                company:
                  type: string
                eventTitle:
                  type: string
                eventDate:
                  type: string
                eventLocation:
                  type: string
      responses:
        '200':
          description: Registration confirmed
        '400':
          description: Missing required fields

  /api/newsletter/subscribe:
    post:
      tags: [Public]
      summary: Subscribe to newsletter
      description: Sends 4-email onboarding sequence via Resend.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Subscribed
        '400':
          description: Email required
        '429':
          description: Rate limited

  /api/resources/download:
    get:
      tags: [Public]
      summary: Proxy download for a resource file
      parameters:
        - in: query
          name: url
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File download
        '400':
          description: URL required

  /api/widget-config:
    get:
      tags: [Public]
      summary: Get public widget configuration (used by the embeddable chat widget)
      responses:
        '200':
          description: Widget config (colors, position, messages)

  # ── Webhooks ──────────────────────────────────────────────────────────────────

  /api/webhooks/paystack:
    post:
      tags: [Webhooks]
      summary: Paystack webhook (admin invoices)
      description: Verifies `x-paystack-signature` HMAC-SHA512. Marks invoice as paid on `charge.success`.
      responses:
        '200':
          description: Processed
        '400':
          description: Invalid signature or unhandled event

  /api/portal/webhooks/paystack:
    post:
      tags: [Webhooks]
      summary: Paystack webhook (portal invoices)
      description: Verifies `x-paystack-signature`. Updates invoice status on `charge.success`.
      responses:
        '200':
          description: Processed
        '400':
          description: Invalid signature

  # ── Push Notifications ────────────────────────────────────────────────────────

  /api/push/subscribe:
    post:
      tags: [Push]
      summary: Subscribe a device to push notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint, p256dh, auth, ownerType, ownerId]
              properties:
                endpoint:
                  type: string
                p256dh:
                  type: string
                auth:
                  type: string
                ownerType:
                  type: string
                  enum: [admin, client]
                ownerId:
                  type: string
      responses:
        '200':
          description: Subscribed

  /api/push/unsubscribe:
    post:
      tags: [Push]
      summary: Unsubscribe a device from push notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint]
              properties:
                endpoint:
                  type: string
      responses:
        '200':
          description: Unsubscribed

  /api/pusher/auth:
    post:
      tags: [Push]
      summary: Authenticate Pusher private/presence channels
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [socket_id, channel_name]
              properties:
                socket_id:
                  type: string
                channel_name:
                  type: string
      responses:
        '200':
          description: Pusher auth token
        '403':
          description: Unauthorized
